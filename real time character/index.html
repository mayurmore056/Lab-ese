<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Counter</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    background: white;
    padding: 20px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Textarea */
textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: none;
    outline: none;
}

/* Counter */
.counter {
    margin-top: 10px;
    font-size: 14px;
}

/* Red warning */
.warning {
    color: red;
}

/* Button */
button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}
</style>
</head>

<body>

<div class="container">
    <h3>Character Counter</h3>

    <textarea id="text" maxlength="200" placeholder="Type here..."></textarea>

    <div class="counter" id="counter">
        Characters: 0 | Words: 0 | Remaining: 200
    </div>

    <button onclick="clearText()">Clear</button>
</div>

<script>
const textarea = document.getElementById("text");
const counter = document.getElementById("counter");
const limit = 200;

textarea.addEventListener("input", () => {
    const text = textarea.value;

    const charCount = text.length;

    // Word count (ignore extra spaces)
    const words = text.trim().split(/\s+/).filter(word => word.length > 0);
    const wordCount = text.trim() === "" ? 0 : words.length;

    const remaining = limit - charCount;

    counter.innerText = 
        `Characters: ${charCount} | Words: ${wordCount} | Remaining: ${remaining}`;

    // Change color when <= 20 remaining
    if (remaining <= 20) {
        counter.classList.add("warning");
    } else {
        counter.classList.remove("warning");
    }
});

function clearText() {
    textarea.value = "";
    counter.innerText = "Characters: 0 | Words: 0 | Remaining: 200";
    counter.classList.remove("warning");
}
</script>

</body>
</html>
