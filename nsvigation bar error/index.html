<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hamburger to X</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    background: #333;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

.logo {
    color: white;
    font-size: 20px;
    font-weight: bold;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 12px;
}

.nav-links a.active {
    background: #4CAF50;
    border-radius: 5px;
}

/* HAMBURGER */
.menu-icon {
    display: none;
    cursor: pointer;
    width: 30px;
    height: 22px;
    position: relative;
}

/* Lines */
.menu-icon span {
    background: white;
    position: absolute;
    height: 3px;
    width: 100%;
    left: 0;
    transition: 0.4s;
}

/* 3 lines positions */
.menu-icon span:nth-child(1) {
    top: 0;
}
.menu-icon span:nth-child(2) {
    top: 9px;
}
.menu-icon span:nth-child(3) {
    top: 18px;
}

/* HIDDEN CHECKBOX */
#menu-toggle {
    display: none;
}

/* MOBILE */
@media (max-width: 600px) {

    .menu-icon {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #333;
        flex-direction: column;
        align-items: center;

        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
    }

    .nav-links a {
        width: 100%;
        text-align: center;
        padding: 15px;
        border-top: 1px solid #444;
    }

    /* SHOW MENU */
    #menu-toggle:checked ~ .nav-links {
        max-height: 400px;
    }

    /* 🔥 HAMBURGER → X ANIMATION */

    /* Top line */
    #menu-toggle:checked + .menu-icon span:nth-child(1) {
        transform: rotate(45deg);
        top: 9px;
    }

    /* Middle line disappears */
    #menu-toggle:checked + .menu-icon span:nth-child(2) {
        opacity: 0;
    }

    /* Bottom line */
    #menu-toggle:checked + .menu-icon span:nth-child(3) {
        transform: rotate(-45deg);
        top: 9px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">MySite</div>

    <!-- Checkbox -->
    <input type="checkbox" id="menu-toggle">

    <!-- Hamburger Icon -->
    <label for="menu-toggle" class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <!-- Links -->
    <div class="nav-links">
        <a href="Home.html" class="active">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Portfolio.html">Portfolio</a>
        <a href="Contact.html">Contact</a>
    </div>
</nav>

</body>
</html>
